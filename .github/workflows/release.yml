name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            binary: places-windows-amd64.exe
          - goos: linux
            goarch: amd64
            binary: places-linux-amd64
          - goos: linux
            goarch: arm64
            binary: places-linux-arm64
          - goos: darwin
            goarch: amd64
            binary: places-darwin-amd64
          - goos: darwin
            goarch: arm64
            binary: places-darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BUILD_TIME="$(date -u '+%Y-%m-%d %H:%M UTC')"
          go build -ldflags "-w -s -X main.version=${VERSION} -X 'main.buildTime=${BUILD_TIME}'" \
            -o ${{ matrix.binary }} ./cmd/places
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  build-app:
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            cgo: "0"
            binary: places-app-windows-amd64.exe
            extra_ldflags: "-H windowsgui"
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            cgo: "1"
            binary: places-app-darwin-amd64
            extra_ldflags: ""
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            cgo: "1"
            binary: places-app-darwin-arm64
            extra_ldflags: ""
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            export CGO_LDFLAGS="-framework UniformTypeIdentifiers"
            if [ "${{ matrix.goarch }}" = "amd64" ]; then
              export CGO_CFLAGS="-arch x86_64"
              export CGO_LDFLAGS="-arch x86_64 -framework UniformTypeIdentifiers"
            fi
          fi
          VERSION="${GITHUB_REF_NAME}"
          BUILD_TIME="$(date -u '+%Y-%m-%d %H:%M UTC')"
          go build -tags production \
            -ldflags "-w -s -X main.version=${VERSION} -X 'main.buildTime=${BUILD_TIME}' ${{ matrix.extra_ldflags }}" \
            -o ${{ matrix.binary }} ./cmd/places-app
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: [build, build-app]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
