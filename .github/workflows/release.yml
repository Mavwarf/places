name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            binary: places-windows-amd64.exe
          - goos: linux
            goarch: amd64
            binary: places-linux-amd64
          - goos: linux
            goarch: arm64
            binary: places-linux-arm64
          - goos: darwin
            goarch: amd64
            binary: places-darwin-amd64
          - goos: darwin
            goarch: arm64
            binary: places-darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BUILD_TIME="$(date -u '+%Y-%m-%d %H:%M UTC')"
          go build -ldflags "-w -s -X main.version=${VERSION} -X 'main.buildTime=${BUILD_TIME}'" \
            -o ${{ matrix.binary }} ./cmd/places
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  build-app:
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            cgo: "0"
            binary: places-app-windows-amd64.exe
            extra_ldflags: "-H windowsgui"
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            cgo: "1"
            binary: places-app-darwin-amd64
            extra_ldflags: ""
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            cgo: "1"
            binary: places-app-darwin-arm64
            extra_ldflags: ""
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            export CGO_LDFLAGS="-framework UniformTypeIdentifiers"
            if [ "${{ matrix.goarch }}" = "amd64" ]; then
              export CGO_CFLAGS="-arch x86_64"
              export CGO_LDFLAGS="-arch x86_64 -framework UniformTypeIdentifiers"
            fi
          fi
          VERSION="${GITHUB_REF_NAME}"
          BUILD_TIME="$(date -u '+%Y-%m-%d %H:%M UTC')"
          go build -tags production \
            -ldflags "-w -s -X main.version=${VERSION} -X 'main.buildTime=${BUILD_TIME}' ${{ matrix.extra_ldflags }}" \
            -o ${{ matrix.binary }} ./cmd/places-app
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  bundle-mac:
    needs: build-app
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            binary: places-app-darwin-amd64
            bundle: Places-darwin-amd64.zip
          - goarch: arm64
            binary: places-app-darwin-arm64
            bundle: Places-darwin-arm64.zip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.binary }}
      - name: Create .app bundle
        run: |
          VERSION="${GITHUB_REF_NAME}"
          APP="Places.app"
          mkdir -p "${APP}/Contents/MacOS" "${APP}/Contents/Resources"
          chmod +x ${{ matrix.binary }}
          cp ${{ matrix.binary }} "${APP}/Contents/MacOS/places-app"

          cat > "${APP}/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleExecutable</key><string>places-app</string>
          <key>CFBundleIdentifier</key><string>com.mavwarf.places</string>
          <key>CFBundleName</key><string>Places</string>
          <key>CFBundleDisplayName</key><string>Places</string>
          <key>CFBundleVersion</key><string>${VERSION}</string>
          <key>CFBundleShortVersionString</key><string>${VERSION}</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>CFBundleIconFile</key><string>AppIcon</string>
          <key>NSHighResolutionCapable</key><true/>
          <key>NSSupportsAutomaticGraphicsSwitching</key><true/>
          </dict></plist>
          PLIST

          ICONSET=$(mktemp -d)/AppIcon.iconset
          mkdir -p "$ICONSET"
          for size in 16 32 128 256 512; do
            sips -z $size $size cmd/places-app/appicon.png --out "$ICONSET/icon_${size}x${size}.png" >/dev/null 2>&1
            double=$((size * 2))
            if [ $double -le 1024 ]; then
              sips -z $double $double cmd/places-app/appicon.png --out "$ICONSET/icon_${size}x${size}@2x.png" >/dev/null 2>&1
            fi
          done
          iconutil -c icns "$ICONSET" -o "${APP}/Contents/Resources/AppIcon.icns"

          zip -r ${{ matrix.bundle }} "${APP}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bundle }}
          path: ${{ matrix.bundle }}

  release:
    needs: [build, build-app, bundle-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
