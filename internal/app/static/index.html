* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--fg);
  padding: 4px 12px 0;
  line-height: 1.5;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
.header-section {
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  padding-bottom: 2px;
  margin: 0 -12px;
  padding-left: 12px;
  padding-right: 12px;
  position: relative;
  z-index: 200;
}
h1 {
  font-size: 1.3em;
  margin-bottom: 20px;
  color: var(--accent);
  font-weight: 600;
}
h1 span { color: var(--fg-dim); font-weight: 400; }

/* Add form */
.add-form {
  display: none;
  gap: 10px;
  margin-bottom: 10px;
  align-items: center;
}
.add-form.open {
  display: flex;
}
.btn-add-toggle {
  background: transparent;
  color: var(--fg-dim);
  border: 1px solid var(--border);
  border-radius: 6px;
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 14px;
  padding: 0;
  line-height: 1;
  transition: color 0.15s, border-color 0.15s;
}
.btn-add-toggle:hover { color: var(--accent); border-color: var(--accent); }
.btn-add-toggle.open { color: var(--accent); border-color: var(--accent); }
.add-form input {
  font-family: var(--font);
  font-size: 0.85em;
  padding: 7px 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--fg);
  outline: none;
}
.add-form input:focus { border-color: var(--accent); }
.add-form input[name="name"] { width: 140px; }
.add-form input[name="path"] { flex: 1; min-width: 200px; }

/* Buttons */
button {
  font-family: var(--font);
  font-size: 0.8em;
  padding: 6px 14px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: opacity 0.15s;
}
button:hover { opacity: 0.85; }
button:active { opacity: 0.7; }

.btn-add { background: var(--green); color: var(--bg); font-weight: 600; }

/* Action manager dialog */

.am-row {

/* Sort bar */

/* Place list */
.place-list { display: flex; flex-direction: column; gap: 6px; flex: 1; overflow-y: auto; min-height: 0; padding-top: 4px; padding-bottom: 60px; }

.session-summary { display: flex; gap: 8px; padding: 8px 14px; flex-wrap: wrap; }

.session-row.all-row .session-place { color: var(--fg); }
.session-row.all-row .session-bar-wrap { background: var(--bg2); }

.place-row {
  display: flex;
  align-items: center;

  border: 1px solid var(--border);

}

/* Compact mode — hides git, notes, path; shows tags inline + stats single-line */
.compact .place-meta,

.desktop-group-header {

}

.health-dot.health-yellow { color: var(--yellow); }
.health-dot.health-red { color: var(--red); }

.place-name {
  font-weight: 600;
  color: var(--accent);

}

.place-info { display: flex; flex-direction: column; flex: 1; min-width: 0; gap: 0; line-height: 1.3; }

/* Import/Export buttons */
.btn-io {
  background: transparent;
  color: var(--fg-dim);
  border: 1px solid var(--border);

}

.place-tags {

  font-size: 0.9em;
}

/* Toast */
.status-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  padding: 4px 16px;
  font-size: 11px;
  color: var(--fg-dim);
  background: var(--bg);
  border-top: 1px solid var(--border);

}

  color: var(--fg-dim);
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font);
  height: 24px;
  width: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s, border-color 0.15s;
  position: relative;
}
.theme-more:hover { color: var(--accent); border-color: var(--accent); }
.theme-picker {
  display: none;
  position: absolute;
  top: 28px;
  right: 0;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 0;
  z-index: 300;
  box-shadow: 0 4px 12px var(--shadow);
  min-width: 160px;
  max-height: 70vh;
  overflow-y: auto;
}
.theme-picker.open { display: block; }
.theme-picker-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 12px;
  cursor: pointer;
  font-size: 0.82em;
  color: var(--fg);
  white-space: nowrap;
  background: none;
  border: none;
  width: 100%;
  font-family: var(--font);
  text-align: left;
}
.theme-picker-item:hover { background: var(--bg3); }
.theme-picker-item.active { color: var(--accent); }
.theme-picker-check { width: 16px; text-align: center; }

/* Screenshot badge */
.screenshot-badge {
  font-size: 11px;
  color: var(--yellow);
  border: 1px solid var(--yellow);
  border-radius: 4px;
  padding: 1px 8px;
  opacity: 0.7;
  display: none;
  margin-left: auto;
}
.screenshot-badge.visible { display: inline-block; }
.screenshot-badge:not(.visible) ~ .btn-add-toggle { margin-left: auto; }

/* Window controls */
.window-controls {
  display: flex;
  gap: 4px;
  margin-left: 8px;
}
.win-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--fg-dim);
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 14px;
  padding: 0;
  line-height: 1;
}
.win-btn:hover { color: var(--fg); border-color: var(--fg-dim); }
.win-btn-pin.active { color: var(--accent); border-color: var(--accent); }

/* Git status */
.btn-git {
  font-size: 0.7em;
  padding: 2px 8px;
  border-radius: 4px;
  background: transparent;
  color: var(--fg-dim);
  border: 1px dashed var(--border);
  cursor: pointer;
}
.btn-git:hover { color: var(--accent); border-color: var(--accent); }
.badge-git-clean {
  font-size: 0.7em;
  padding: 2px 8px;
  border-radius: 4px;
  background: color-mix(in srgb, var(--green) 15%, transparent);
  color: var(--green);
  cursor: default;
}
.badge-git-dirty {
  font-size: 0.7em;
  padding: 2px 8px;
  border-radius: 4px;
  background: color-mix(in srgb, var(--yellow) 15%, transparent);
  color: var(--yellow);
  cursor: default;
}
.badge-git-error {
  font-size: 0.7em;
  padding: 2px 8px;
  border-radius: 4px;
  background: color-mix(in srgb, var(--red) 15%, transparent);
  color: var(--red);
}
.badge-git-none {
  font-size: 0.7em;
  padding: 2px 8px;
  border-radius: 4px;
  color: var(--fg-dim);
  cursor: pointer;
}
.badge-git-none:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="header-section">
<div class="header">
  <h1>places dashboard <span>workspace navigator</span></h1>
  <button class="btn-add-toggle" id="add-toggle" onclick="toggleAddForm()" title="Add new place">+</button>
  <span class="spacer"></span>
  <button class="btn-recent-toggle" id="sessions-toggle" onclick="toggleSessions()" title="Session time tracking (F3)">Sessions</button>
  <span class="spacer"></span>
  <span class="screenshot-badge" id="screenshot-badge" onclick="toggleScreenshot()" style="cursor:pointer" title="Click to exit screenshot mode">screenshot</span>
  <button class="btn-recent-toggle" id="recent-toggle" onclick="toggleRecent()" title="Toggle recent actions">Recent</button>
  <button class="btn-recent-toggle" id="compact-toggle" onclick="toggleCompact()" title="Toggle compact view">Compact</button>
  <button class="theme-more" id="theme-more" onclick="toggleThemePicker()" title="Color theme"><div class="theme-picker" id="theme-picker"></div>&#127912;</button>
  <button class="theme-more" id="prefs-btn" onclick="togglePrefs()" title="Preferences"><div class="theme-picker" id="prefs-picker"></div>&#9881;</button>
  <div class="window-controls">
    <button class="win-btn win-btn-pin" id="pin-all-btn" onclick="togglePinAllDesktops()" title="Show on all desktops">&#127760;</button>
    <button class="win-btn win-btn-pin" id="pin-btn" onclick="togglePin()" title="Pin on top">&#128204;</button>
  </div>
</div>
<div class="status-bar">
  <span>By <a href="https://mavwarf.netlify.app/" target="_blank" rel="noopener" class="status-link">Thomas H&auml;user</a> &middot; <a href="https://github.com/Mavwarf/places" target="_blank" rel="noopener" class="status-link-accent">GitHub</a> &middot; <a href="https://github.com/Mavwarf/places/wiki/Desktop-App" target="_blank" rel="noopener" class="status-link-accent">Wiki</a></span>
  <span id="status-count"></span>
  <span>{{build_time}}{{version}}</span>
</div>

<form class="add-form" onsubmit="return addPlace(event)">
  <input name="name" placeholder="name" required autocomplete="off">
  <input name="path" placeholder="C:\path\to\directory" required autocomplete="off">
  <button type="button" class="btn-browse" onclick="browsePath()" title="Browse for folder">&hellip;</button>
  <input name="tags" placeholder="tags (comma-separated)" autocomplete="off" class="input-tags">
  <input name="note" placeholder="note (optional)" autocomplete="off" class="input-note">
  <button type="submit" class="btn-add">Add</button>
</form>

<div class="tag-bar" id="tag-bar"><span id="tag-bar-left"></span><input class="filter-search" id="filter-search" type="text" placeholder="Filter..." oninput="textFilter=this.value;saveFilters();load()" /><span id="tag-bar-right"></span><span class="spacer"></span><span id="tag-bar-git"></span></div>

<div class="sort-bar">
  <span>Sort:</span>
  <button class="sort-btn" onclick="setSort('name')" id="sort-name">Name</button>
  <button class="sort-btn" onclick="setSort('use_count')" id="sort-use_count">Most used</button>
  <button class="sort-btn" onclick="setSort('last_used')" id="sort-last_used">Last used</button>
  <button class="sort-btn" onclick="setSort('added')" id="sort-added">Added</button>
  <button class="sort-btn" onclick="setSort('frecency')" id="sort-frecency" title="Frequency + recency combined">Frecency</button>
  <button class="sort-btn" onclick="setSort('desktop')" id="sort-desktop" title="Group by virtual desktop, unassigned at bottom">Desktop</button>
  <span style="width:12px"></span>
  <button class="sort-btn" id="pin-favs-btn" onclick="togglePinFavs()" title="Pin favorites to top of list">Pin &#9733;</button>
  <span class="spacer"></span>
  <button class="btn-io" onclick="exportPlaces()" title="Export places as JSON">Export</button>
  <button class="btn-io" onclick="importPlaces()" title="Import places from JSON">Import</button>
  <input type="file" id="import-file" accept=".json" class="hidden" onchange="handleImportFile(event)">
</div>
</div>
<div id="places" class="place-list"></div>
<div id="sessions-view" class="place-list" style="display:none"></div>
<div class="recent-bar hidden" id="recent-bar"><span class="recent-label">Recent:</span><span class="recent-chips" id="recent-chips"></span><span id="fav-actions-area"></span></div>

<script>
// Add form toggle
function toggleAddForm() {
  const form = document.querySelector('.add-form');
  const btn = document.getElementById('add-toggle');
  const open = form.classList.toggle('open');
  btn.classList.toggle('open', open);
  if (open) form.querySelector('input[name="name"]').focus();
}

// Theme cycle
const THEMES = [
  // Dark — deepest backgrounds (#000-#1a), sorted darkest first
  { name: 'high-contrast',  icon: '\u25C9', label: 'High Contrast',   cat: 'dark' },
  { name: 'ayu-dark',       icon: '\u2600', label: 'Ayu Dark',        cat: 'dark' },
  { name: 'flexoki-dark',   icon: '\u270E', label: 'Flexoki',         cat: 'dark' },
  { name: 'vesper',         icon: '\u2B50', label: 'Vesper',          cat: 'dark' },
  { name: 'github-dark',    icon: '\u{1F4BB}', label: 'GitHub Dark',  cat: 'dark' },
  { name: 'night-owl',      icon: '\u{1F989}', label: 'Night Owl',    cat: 'dark' },
  { name: 'cobalt2',        icon: '\u{1F4A0}', label: 'Cobalt2',      cat: 'dark' },
  { name: 'rosepine',       icon: '\u2740', label: 'Ros\u00E9 Pine',  cat: 'dark' },
  { name: 'dark',           icon: '\u263D', label: 'Dark',            cat: 'dark' },
  { name: 'tokyo-night',    icon: '\u{1F303}', label: 'Tokyo Night',  cat: 'dark' },
  { name: 'poimandres',     icon: '\u269B', label: 'Poimandres',      cat: 'dark' },
  { name: 'horizon',        icon: '\u{1F305}', label: 'Horizon',      cat: 'dark' },
  { name: 'catppuccin',     icon: '\u2615', label: 'Catppuccin',      cat: 'dark' },
  { name: 'kanagawa',       icon: '\u2387', label: 'Kanagawa',        cat: 'dark' },
  // Warm — medium-dark backgrounds (#26-#40), sorted darkest first
  { name: 'material',       icon: '\u25FC', label: 'Material',        cat: 'warm' },
  { name: 'monokai',        icon: '\u25B6', label: 'Monokai',         cat: 'warm' },
  { name: 'gruvbox',        icon: '\u25A3', label: 'Gruvbox',         cat: 'warm' },
  { name: 'dracula',        icon: '\u2605', label: 'Dracula',         cat: 'warm' },
  { name: 'onedark',        icon: '\u25C6', label: 'One Dark',        cat: 'warm' },
  { name: 'synthwave',      icon: '\u{1F4FB}', label: 'Synthwave',    cat: 'warm' },
  { name: 'palenight',      icon: '\u263E', label: 'Palenight',       cat: 'warm' },
  { name: 'solarized',      icon: '\u25D0', label: 'Solarized',       cat: 'warm' },
  { name: 'everforest',     icon: '\u2618', label: 'Everforest',      cat: 'warm' },
  { name: 'nord',           icon: '\u2744', label: 'Nord',            cat: 'warm' },
  { name: 'zenburn',        icon: '\u2623', label: 'Zenburn',         cat: 'warm' },
  // Light — bright backgrounds (#ef+)
  { name: 'light',               icon: '\u2600', label: 'Light',             cat: 'light' },
  { name: 'high-contrast-light', icon: '\u25C9', label: 'High Contrast',     cat: 'light' },
  { name: 'github-light',        icon: '\u{1F4BB}', label: 'GitHub Light',   cat: 'light' },
  { name: 'catppuccin-latte',    icon: '\u2615', label: 'Catppuccin Latte',  cat: 'light' },
  { name: 'rosepine-dawn',       icon: '\u2740', label: 'Ros\u00E9 Dawn',    cat: 'light' },
  { name: 'everforest-light',    icon: '\u2618', label: 'Everforest Light',  cat: 'light' },
  { name: 'flexoki-light',       icon: '\u270E', label: 'Flexoki Light',     cat: 'light' },
  { name: 'solarized-light',     icon: '\u25D0', label: 'Solarized Light',   cat: 'light' },
  { name: 'one-light',          icon: '\u25C6', label: 'One Light',          cat: 'light' },
  { name: 'quiet-light',        icon: '\u25CB', label: 'Quiet Light',        cat: 'light' },
  { name: 'alabaster',          icon: '\u25A1', label: 'Alabaster',          cat: 'light' },
  { name: 'ayu-light',          icon: '\u2600', label: 'Ayu Light',          cat: 'light' },
];
const THEME_CATS = [
  { key: 'dark',  label: 'Dark' },
  { key: 'warm',  label: 'Warm' },
  { key: 'light', label: 'Light' },
];
const savedTheme = localStorage.getItem('places-theme');
let themeIdx = Math.max(0, THEMES.findIndex(function(t) { return t.name === savedTheme; }));
document.documentElement.dataset.theme = THEMES[themeIdx].name;

function applyTheme(idx) {
  themeIdx = idx;
  document.documentElement.dataset.theme = THEMES[themeIdx].name;
  localStorage.setItem('places-theme', THEMES[themeIdx].name);
  toast(THEMES[themeIdx].label);
}

function toggleThemePicker() {
  const picker = document.getElementById('theme-picker');
  const isOpen = picker.classList.toggle('open');
  if (!isOpen) return;
  let html = '<div style="display:flex;gap:0">';
  THEME_CATS.forEach(function(cat, ci) {
    html += `<div style="flex:1;${ci > 0 ? 'border-left:1px solid var(--border)' : ''}">`;
    html += `<div style="padding:5px 12px 2px;font-size:0.75em;color:var(--fg-dim);text-transform:uppercase;letter-spacing:0.5px">${cat.label}</div>`;
    THEMES.forEach(function(t, i) {
      if (t.cat !== cat.key) return;
      html += `<button class="theme-picker-item${i === themeIdx ? ' active' : ''}" onclick="pickTheme(${i})" onmouseenter="previewTheme(${i})" onmouseleave="previewTheme(${themeIdx})">` +
        `<span class="theme-picker-check">${i === themeIdx ? '\u2713' : ''}</span>` +
        `${t.icon} ${t.label}</button>`;
    });
    html += '</div>';
  });
  html += '</div>';
  picker.innerHTML = html;
}

function previewTheme(idx) {
  document.documentElement.dataset.theme = THEMES[idx].name;
}

function pickTheme(idx) {
  document.getElementById('theme-picker').classList.remove('open');
  applyTheme(idx);
}

document.addEventListener('click', function(e) {
  const picker = document.getElementById('theme-picker');
  const btn = document.getElementById('theme-more');
  if (!btn.contains(e.target)) picker.classList.remove('open');
  const prefsPicker = document.getElementById('prefs-picker');
  const prefsBtn = document.getElementById('prefs-btn');
  if (!prefsBtn.contains(e.target)) prefsPicker.classList.remove('open');
});

function togglePrefs() {
  const picker = document.getElementById('prefs-picker');
  const isOpen = picker.classList.toggle('open');
  if (!isOpen) return;
  const effortCheck = e => (defaultEffort || '') === e || (!defaultEffort && e === 'medium');
  const isWin = placesOS === 'windows';
  picker.innerHTML =
    // Claude section
    `<div style="padding:5px 12px 2px;font-size:0.75em;color:var(--fg-dim);text-transform:uppercase;letter-spacing:0.5px">Claude</div>` +
    (isWin ? `<button class="theme-picker-item" onclick="toggleClaudeShell()">Shell: ${claudeShell}</button>` : '') +
    (isWin ? `<button class="theme-picker-item" onclick="toggleSuppressTitle()">Custom tab title: ${suppressTitle ? 'on' : 'off'}</button>` : '') +
    (!isWin && hasITerm ? `<button class="theme-picker-item" onclick="toggleClaudeShell()">Terminal: ${claudeShell === 'terminal' ? 'Terminal.app' : 'iTerm2'}</button>` : '') +
    `<button class="theme-picker-item" onclick="toggleSkipFreshConfirm()">Confirm fresh session: ${skipFreshConfirm ? 'off' : 'on'}</button>` +
    `<div style="padding:5px 12px 2px;font-size:0.75em;color:var(--fg-dim)">Effort level:</div>` +
    EFFORT_LEVELS.filter(e => e !== '').map(e =>
      `<button class="theme-picker-item${effortCheck(e) ? ' active' : ''}" onclick="setDefaultEffort('${e}')">${effortCheck(e) ? '\u2713 ' : '\u00a0\u00a0\u00a0 '}${e}</button>`
    ).join('') +
    // Actions section
    `<div style="padding:8px 12px 2px;font-size:0.75em;color:var(--fg-dim);text-transform:uppercase;letter-spacing:0.5px;border-top:1px solid var(--border);margin-top:4px">Actions</div>` +
    `<button class="theme-picker-item" onclick="openActionManager()">Manage custom actions</button>` +
    // Monitoring section
    `<div style="padding:8px 12px 2px;font-size:0.75em;color:var(--fg-dim);text-transform:uppercase;letter-spacing:0.5px;border-top:1px solid var(--border);margin-top:4px">Monitoring</div>` +
    `<button class="theme-picker-item" onclick="toggleDetectRunning()">Detect running sessions: ${detectRunning ? 'on' : 'off'}</button>` +
    // Integration section
    `<div style="padding:8px 12px 2px;font-size:0.75em;color:var(--fg-dim);text-transform:uppercase;letter-spacing:0.5px;border-top:1px solid var(--border);margin-top:4px">Integration</div>` +
    `<button class="theme-picker-item" onclick="editNotifyPath()">Notify path${notifyPath ? ': ' + esc(notifyPath.split('/').pop()) : ' (not set)'}</button>` +
    `<button class="theme-picker-item" onclick="openConfigFolder()">Open config folder</button>`;
}

async function openConfigFolder() {
  document.getElementById('prefs-picker').classList.remove('open');
  try {
    const res = await fetch('/api/open-config', {method: 'POST'});
    if (!res.ok) toast(await res.text() || 'Failed to open config folder', true);
  } catch (e) { toast('Failed to open config folder', true); }
}

async function editNotifyPath() {
  document.getElementById('prefs-picker').classList.remove('open');
  const p = await inputDialog('Path to notify executable:', notifyPath || 'C:/dev/tools/cli/notify.exe');
  if (p === null) return;
  try {
    const res = await fetch('/api/notify-path', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({path: p})
    });
    if (!res.ok) { toast(await res.text() || 'Failed to save notify path', true); return; }
    notifyPath = p;
    toast('Notify path saved');
  } catch (e) { toast('Failed to save notify path', true); }
}

function toggleSkipFreshConfirm() {
  document.getElementById('prefs-picker').classList.remove('open');
  skipFreshConfirm = !skipFreshConfirm;
  localStorage.setItem('places-skip-fresh-confirm', skipFreshConfirm ? 'on' : '');
  toast('Confirm fresh session: ' + (skipFreshConfirm ? 'off' : 'on'));
}

async function toggleClaudeShell() {
  document.getElementById('prefs-picker').classList.remove('open');
  let newShell;
  if (placesOS === 'windows') {
    newShell = claudeShell === 'cmd' ? 'powershell' : 'cmd';
  } else {
    newShell = claudeShell === 'terminal' ? 'iterm' : 'terminal';
  }
  try {
    const res = await fetch('/api/claude-shell', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({shell: newShell})
    });
    if (!res.ok) { toast(await res.text() || 'Failed', true); return; }
    claudeShell = newShell;
    const label = {cmd:'cmd',powershell:'PowerShell',iterm:'iTerm2',terminal:'Terminal.app'}[newShell] || newShell;
    toast('Terminal: ' + label);
  } catch (e) { toast('Failed to save Claude shell', true); }
}

async function toggleSuppressTitle() {
  document.getElementById('prefs-picker').classList.remove('open');
  suppressTitle = !suppressTitle;
  try {
    const res = await fetch('/api/suppress-title', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({suppress: suppressTitle})
    });
    if (!res.ok) { toast(await res.text() || 'Failed', true); return; }
    toast('Set tab title: ' + (suppressTitle ? 'on (keeps custom title)' : 'off (Claude shows status)'));
  } catch (e) { toast('Failed to save setting', true); }
}

async function toggleDetectRunning() {
  document.getElementById('prefs-picker').classList.remove('open');
  detectRunning = !detectRunning;
  try {
    const res = await fetch('/api/detect-running', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({enabled: detectRunning})
    });
    if (!res.ok) { toast(await res.text() || 'Failed', true); return; }
    toast('Detect running sessions: ' + (detectRunning ? 'on' : 'off'));
    if (detectRunning) updateRunningSessions();
    else { runningSessions = []; applyRunningGlow(); }
  } catch (e) { toast('Failed to save setting', true); }
}

const EFFORT_LEVELS = ['', 'low', 'medium', 'high', 'max'];
const EFFORT_LABELS = {'': 'default', 'low': 'low', 'medium': 'medium', 'high': 'high', 'max': 'max'};

async function setDefaultEffort(level) {
  document.getElementById('prefs-picker').classList.remove('open');
  defaultEffort = level;
  try {
    const res = await fetch('/api/default-effort', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({effort: level})
    });
    if (!res.ok) { toast(await res.text() || 'Failed', true); return; }
    toast('Default Claude effort: ' + level);
  } catch (e) { toast('Failed to save effort', true); }
}

async function setPlaceEffort(placeName, effort) {
  try {
    const res = await fetch('/api/effort', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: placeName, effort: effort})
    });
    if (!res.ok) { toast(await res.text() || 'Failed', true); return; }
    toast(placeName + ' effort: ' + (effort || 'default'));
    load();
  } catch (e) { toast('Failed to save effort', true); }
}

// Action manager dialog
function openActionManager() {
  document.getElementById('prefs-picker').classList.remove('open');
  const overlay = document.createElement('div');
  overlay.className = 'action-manager-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
  const panel = document.createElement('div');
  panel.className = 'action-manager';
  overlay.appendChild(panel);
  document.body.appendChild(overlay);
  renderActionManager(panel);
  document.addEventListener('keydown', function escClose(e) {
    if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', escClose); }
  });
}

function renderActionManager(panel) {
  const allDefaults = placesOS === 'windows'
    ? ['claude', 'explorer', 'code', 'powershell', 'cmd']
    : ['claude', 'explorer', 'code', 'terminal'];
  const defaultLabels = placesOS === 'windows'
    ? {claude: 'cl', explorer: 'dir', code: 'VS', powershell: 'PS', cmd: '>_'}
    : {claude: 'cl', explorer: placesOS === 'darwin' ? '\uD83D\uDCC1' : 'dir', code: 'VS', terminal: '>_'};
  const actions = Object.entries(actionDefs).sort((a, b) => a[0].localeCompare(b[0]));
  let html = '<h2>Custom actions <button onclick="this.closest(\'.action-manager-overlay\').remove()">&times;</button></h2>';

  if (actions.length) {
    html += actions.map(([name, def]) => {
      const used = lastPlacesData.filter(p => p.actions && p.actions.includes(name)).length;
      return `<div class="am-row"><span class="am-name">${esc(name)}</span><span class="am-label">${esc(def.label)}</span><span class="am-cmd" title="${esc(def.cmd)}">${esc(def.cmd)}</span><span class="am-used">${used} place${used !== 1 ? 's' : ''}</span><button class="am-edit" onclick="editActionDef('${esc(name)}')">Edit</button><button class="am-del" onclick="deleteActionDef('${esc(name)}',this)">Delete</button></div>`;
    }).join('');
  } else {
    html += '<div style="color:var(--fg-dim);font-size:0.85em;padding:8px 0">No custom actions defined</div>';
  }

  html += `<div class="am-form">
    <input name="am-name" placeholder="name" />
    <input name="am-label" placeholder="label" maxlength="4" />
    <input name="am-cmd" placeholder="command template ({path}, {name})" />
    <button onclick="browseForApp(this)" title="Pick an executable">…</button>
    <button onclick="addActionDef(this)">Add</button>
  </div>`;

  html += `<div class="am-section"><h3>Default actions for new places</h3><div class="am-defaults">`;
  html += allDefaults.map(d => {
    const hidden = defaultHidden.includes(d);
    return `<button class="am-default-chip ${hidden ? 'def-hidden' : 'def-visible'}" onclick="toggleDefaultAction('${d}')">${defaultLabels[d]}</button>`;
  }).join('');

    html += '</div><h3 style="margin-top:8px;font-size:0.85em;color:var(--fg-dim);margin-bottom:4px">Auto-assign custom actions</h3><div class="am-defaults">';

  }
  html += '</div><div style="color:var(--fg-dim);font-size:0.75em;margin-top:4px">Green = active for new places</div></div>';

  panel.innerHTML = html;
}

async function addActionDef(btn) {
  const form = btn.closest('.am-form');
  const name = form.querySelector('[name="am-name"]').value.trim();
  const label = form.querySelector('[name="am-label"]').value.trim();

async function browseForApp(btn) {
  try {
    const res = await fetch('/api/browse-file', { method: 'POST' });
    if (res.status === 204) return;
    if (!res.ok) { toast('Failed to browse', true); return; }
    const data = await res.json();
    const exePath = data.path.replace(/\\/g, '\\\\');
    const form = btn.closest('.am-form');
    form.querySelector('[name="am-cmd"]').value = 'start "" "' + exePath + '" "{path}"';
    // Auto-fill label from exe name if empty
    const labelInput = form.querySelector('[name="am-label"]');
    if (!labelInput.value) {
      const exeName = data.path.split(/[/\\]/).pop().replace(/\.exe$/i, '');
      labelInput.value = exeName.substring(0, 4).toUpperCase();
    }
    // Auto-fill name from exe name if empty
    const nameInput = form.querySelector('[name="am-name"]');
    if (!nameInput.value) {
      nameInput.value = data.path.split(/[/\\]/).pop().replace(/\.exe$/i, '').toLowerCase();
    }
  } catch (e) { toast('Failed to browse', true); }
}

// Recent action history
const MAX_RECENT = 8;

let favActions = [];

(function loadHistory() {
  try { recentHistory = JSON.parse(localStorage.getItem('places-recent')) || []; } catch (e) { recentHistory = []; }
  try { favActions = JSON.parse(localStorage.getItem('places-fav-actions')) || []; } catch (e) { favActions = []; }
})();

function saveHistory() {
  localStorage.setItem('places-recent', JSON.stringify(recentHistory));
}

function saveFavActions() {
  localStorage.setItem('places-fav-actions', JSON.stringify(favActions));
  fetch('/api/sync-fav-actions', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(favActions.map(h => ({name: h.name, action: h.action, shift: !!h.shift, ctrl: !!h.ctrl})))
  }).catch(() => {});
}

function recordHistory(name, action, shift, ctrl) {
  const suffix = ctrl ? ':yolo' : shift ? ':fresh' : '';
  const key = name + '·' + action + suffix;
  // Skip if this action is already in favorites.
  if (favActions.some(h => h.key === key)) { renderRecent(); return; }
  recentHistory = recentHistory.filter(h => h.key !== key);
  recentHistory.unshift({ key, name, action, shift: !!shift, ctrl: !!ctrl, ts: Date.now() });
  if (recentHistory.length > MAX_RECENT) recentHistory.length = MAX_RECENT;
  saveHistory();
  renderRecent();
  // Sync to server for tray menu.
  fetch('/api/record-recent', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name, action, shift: !!shift, ctrl: !!ctrl})
  }).catch(() => {});
}

function renderRecent() {
  const el = document.getElementById('recent-chips');
  const favEl = document.getElementById('fav-actions-area');
  const toggle = document.getElementById('recent-toggle');
  const bar = document.getElementById('recent-bar');
  toggle.classList.toggle('active', recentVisible);
  const hasContent = recentVisible && (recentHistory.length || favActions.length);
  if (!hasContent) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  const labels = placesOS === 'windows'
    ? { claude: 'CL', explorer: 'dir', code: 'VS', powershell: 'PS', cmd: '>_' }
    : { claude: 'CL', explorer: placesOS === 'darwin' ? '\uD83D\uDCC1' : 'dir', code: 'VS', terminal: '>_' };
  el.innerHTML = recentHistory.map(h => {
    let actionLabel = labels[h.action] || (actionDefs[h.action] ? actionDefs[h.action].label : h.action);
    if (h.ctrl) actionLabel += ' YOLO';
    else if (h.shift) actionLabel += ' fresh';
    const isCustom = !labels[h.action];
    return `<button class="recent-chip" data-rname="${esc(h.name)}" data-raction="${esc(h.action)}" onclick="handleRecentClick(event,'${esc(h.name)}','${esc(h.action)}',${isCustom},${!!h.shift},${!!h.ctrl},'${esc(h.key)}')" oncontextmenu="removeRecent(event,'${esc(h.key)}')" title="${esc(h.name)} → ${esc(actionLabel)}&#10;${placesOS === 'darwin' ? 'Cmd' : 'Ctrl'}+click to pin as favorite&#10;Right-click to remove">${esc(h.name)}<span class="recent-action">·${esc(actionLabel)}</span></button>`;
  }).join('');
  // Favorite actions
  if (favActions.length) {
    let favHtml = '<span class="fav-sep">|</span><span class="fav-label">&#9733;</span><span class="fav-chips">';
    favHtml += favActions.map(h => {
      let actionLabel = labels[h.action] || (actionDefs[h.action] ? actionDefs[h.action].label : h.action);
      if (h.ctrl) actionLabel += ' YOLO';
      else if (h.shift) actionLabel += ' fresh';
      const isCustom = !labels[h.action];
      return `<span class="fav-action-chip" draggable="true" data-fav-idx="${favActions.indexOf(h)}" data-rname="${esc(h.name)}" data-raction="${esc(h.action)}" onclick="replayRecent('${esc(h.name)}','${esc(h.action)}',${isCustom},${!!h.shift},${!!h.ctrl})" oncontextmenu="removeFavAction(event,'${esc(h.key)}')" ondragstart="favDragStart(event)" ondragover="favDragOver(event)" ondrop="favDrop(event)" ondragend="favDragEnd(event)" title="${esc(h.name)} → ${esc(actionLabel)} ★&#10;Drag to reorder&#10;Right-click to remove">${esc(h.name)}<span class="recent-action">·${esc(actionLabel)}</span></span>`;
    }).join('');
    favHtml += '</span>';
    favEl.innerHTML = favHtml;
  } else {
    favEl.innerHTML = '';
  }
}

function replayRecent(name, action, isCustom, shift, ctrl) {
  if (isCustom) runCustomAction(name, action);
  else openAt(name, action, shift, ctrl);
}

function handleRecentClick(e, name, action, isCustom, shift, ctrl, key) {
  if (e.ctrlKey || e.metaKey) {
    // Ctrl+click (Cmd+click on Mac): move to favorites
    const entry = recentHistory.find(h => h.key === key);
    if (!entry) return;
    // Don't add duplicate favorites
    if (favActions.some(h => h.key === key)) { toast(name + ' already in favorites'); return; }
    favActions.push({...entry});
    // Remove from recent
    recentHistory = recentHistory.filter(h => h.key !== key);
    saveHistory();
    saveFavActions();
    renderRecent();
    toast('Pinned ' + name + ' to favorites');
    return;
  }
  replayRecent(name, action, isCustom, shift, ctrl);
}

function removeFavAction(e, key) {
  e.preventDefault();
  const entry = favActions.find(h => h.key === key);
  favActions = favActions.filter(h => h.key !== key);
  saveFavActions();
  renderRecent();
  if (entry) toast('Removed ' + entry.name + ' from favorites');
}

let favDragIdx = -1;
function favDragStart(e) {
  favDragIdx = parseInt(e.target.dataset.favIdx);
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function favDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function favDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const toIdx = parseInt(e.currentTarget.dataset.favIdx);
  if (favDragIdx < 0 || favDragIdx === toIdx) return;
  const item = favActions.splice(favDragIdx, 1)[0];
  favActions.splice(toIdx, 0, item);
  saveFavActions();
  renderRecent();
}
function favDragEnd(e) {
  favDragIdx = -1;
  document.querySelectorAll('.fav-action-chip').forEach(el => el.classList.remove('dragging', 'drag-over'));
}

function removeRecent(e, key) {
  e.preventDefault();
  const entry = recentHistory.find(h => h.key === key);
  recentHistory = recentHistory.filter(h => h.key !== key);
  saveHistory();
  renderRecent();
  if (entry) toast('Removed ' + entry.name + ' from recent');
}

function fmtDuration(secs) {
  if (secs < 60) return secs + 's';
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  if (h > 0) return h + 'h ' + (m > 0 ? m + 'm' : '');
  return m + 'm';
}

function fmtTime(unix) {
  const d = new Date(unix * 1000);
  return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
}
function fmtDateTime(unix) {
  const d = new Date(unix * 1000);
  return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }) + ' ' + fmtTime(unix);
}

function fmtDate(d) {
  const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate();
}

function actionColor(action) {
  if (action === 'claude') return 'claude';
  if (action === 'code') return 'code';
  if (action === 'terminal' || action === 'powershell' || action === 'cmd') return 'terminal';
  if (action === 'explorer') return 'explorer';
  return 'other';
}

async function loadSessions() {
  const el = document.getElementById('sessions-view');
  const now = new Date();
  const dayStart = new Date(sessionsDate.getFullYear(), sessionsDate.getMonth(), sessionsDate.getDate());
  let from, to;
  if (sessionsRange === 'week') {
    const dayOfWeek = dayStart.getDay();
    const mondayOffset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    from = Math.floor(new Date(dayStart.getTime() - mondayOffset * 86400000).getTime() / 1000);
    to = Math.floor(new Date(dayStart.getTime() + 7 * 86400000).getTime() / 1000);
  } else {
    from = Math.floor(dayStart.getTime() / 1000);
    to = Math.floor(new Date(dayStart.getTime() + 86400000).getTime() / 1000);
  }

  try {
    const res = await fetch('/api/sessions?from=' + from + '&to=' + to);
    const sessions = (await res.json() || []).filter(s => s.duration >= 60);

    // Group by day
    const days = {};
    sessions.forEach(function(s) {
      const d = new Date(s.started_at * 1000);
      const key = d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
      if (!days[key]) days[key] = { date: new Date(d.getFullYear(), d.getMonth(), d.getDate()), sessions: [], total: 0 };
      days[key].sessions.push(s);
      days[key].total += s.duration;
    });

    const sortedDays = Object.values(days).sort((a, b) => b.date - a.date);
    // De-overlap all sessions for accurate grand total
    const allSorted = sessions.slice().sort((a, b) => a.started_at - b.started_at);
    const allMerged = [];
    allSorted.forEach(function(s) {
      const prev = allMerged.length ? allMerged[allMerged.length - 1] : null;
      if (prev && s.started_at <= prev.ended_at) {
        prev.ended_at = Math.max(prev.ended_at, s.ended_at);
      } else {
        allMerged.push({ started_at: s.started_at, ended_at: s.ended_at });
      }
    });
    const grandTotal = allMerged.reduce((sum, s) => sum + (s.ended_at - s.started_at), 0);

    // Summary by place
    const byPlace = {};
    sessions.forEach(function(s) {
      if (!byPlace[s.place]) byPlace[s.place] = 0;
      byPlace[s.place] += s.duration;
    });
    const topPlaces = Object.entries(byPlace).sort((a, b) => b[1] - a[1]);

    // Navigation
    const todayDate = new Date();
    const isToday = dayStart.toDateString() === todayDate.toDateString();
    let html = '<div class="session-nav">';
    html += `<button onclick="sessionsShift(-1)">◀</button>`;
    if (sessionsRange === 'week') {
      const dow = dayStart.getDay();
      const monOff = dow === 0 ? 6 : dow - 1;
      const mon = new Date(dayStart.getTime() - monOff * 86400000);
      const sun = new Date(mon.getTime() + 6 * 86400000);
      const wkLabel = mon.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ' – ' + sun.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      html += `<button class="active">${esc(wkLabel)}</button>`;
    } else {
      const dayLabel = isToday ? 'Today' : dayStart.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
      html += `<button class="active">${esc(dayLabel)}</button>`;
    }
    const atEnd = isToday || (sessionsRange === 'week' && (() => { const dow = dayStart.getDay(); const monOff = dow === 0 ? 6 : dow - 1; const sun = new Date(dayStart.getTime() - monOff * 86400000 + 6 * 86400000); return sun >= todayDate; })());
    html += `<button onclick="sessionsShift(1)"${atEnd ? ' disabled' : ''}>▶</button>`;
    html += `<button class="${sessionsRange === 'day' ? 'active' : ''}" onclick="sessionsRange='day';loadSessions()">Day</button>`;
    html += `<button class="${sessionsRange === 'week' ? 'active' : ''}" onclick="sessionsRange='week';loadSessions()">Week</button>`;
    if (!isToday) html += `<button onclick="sessionsDate=new Date();loadSessions()">Today</button>`;
    html += `<span>Total: ${fmtDuration(grandTotal)}</span>`;
    html += '</div>';

    // Summary cards — include action breakdown in tooltip
    const byPlaceAction = {};
    sessions.forEach(function(s) {
      const k = s.place;
      if (!byPlaceAction[k]) byPlaceAction[k] = {};
      if (!byPlaceAction[k][s.action]) byPlaceAction[k][s.action] = 0;
      byPlaceAction[k][s.action] += s.duration;
    });
    if (topPlaces.length) {
      html += '<div class="session-summary">';
      topPlaces.forEach(function(entry) {
        const labels = getActionLabels();
        const actions = Object.entries(byPlaceAction[entry[0]] || {}).sort((a, b) => b[1] - a[1]);
        const actionTip = actions.map(a => (labels[a[0]] || a[0]) + ': ' + fmtDuration(a[1])).join('&#10;');
        html += `<div class="session-summary-item" title="${esc(entry[0])}&#10;${actionTip}"><div class="ss-label">${esc(entry[0])}</div><div class="ss-value">${fmtDuration(entry[1])}</div></div>`;
      });
      html += '</div>';
    }

    // Render timeline rows for a set of sessions within a given time range
    function renderTimeline(sess, rangeStart, rangeLen, showDate) {
      const tf = showDate ? fmtDateTime : fmtTime;
      let out = '';
      const GAP_THRESHOLD = 300; // 5 minutes
      const byPlace = {};
      sess.forEach(function(s) {
        if (!byPlace[s.place]) byPlace[s.place] = { sessions: [], total: 0 };
        const list = byPlace[s.place].sessions;
        const prev = list.length ? list[list.length - 1] : null;
        if (prev && prev.action === s.action && (s.started_at - prev.ended_at) < GAP_THRESHOLD) {
          prev.ended_at = s.ended_at;
          prev.duration += s.duration;
          prev.count = (prev.count || 1) + 1;
        } else {
          list.push({...s, count: 1});
        }
        byPlace[s.place].total += s.duration;
      });

      // "All" combined row
      if (Object.keys(byPlace).length > 1) {
        const sorted = sess.slice().sort((a, b) => a.started_at - b.started_at);
        const merged = [];
        sorted.forEach(function(s) {
          const prev = merged.length ? merged[merged.length - 1] : null;
          if (prev && s.started_at <= prev.ended_at) {
            prev.ended_at = Math.max(prev.ended_at, s.ended_at);
          } else {
            merged.push({ started_at: s.started_at, ended_at: s.ended_at });
          }
        });
        out += '<div class="session-row all-row">';
        out += '<span class="session-place">All</span>';
        out += '<div class="session-bar-wrap">';
        merged.forEach(function(s) {
          const left = ((s.started_at - rangeStart) / rangeLen * 100).toFixed(1);
          const width = Math.max(((s.ended_at - s.started_at) / rangeLen * 100), 1).toFixed(1);
          const dur = s.ended_at - s.started_at;
          out += `<div class="session-bar other" style="position:absolute;left:${left}%;width:${width}%;top:0;height:100%" title="Active&#10;${tf(s.started_at)} – ${tf(s.ended_at)}&#10;${fmtDuration(dur)}"></div>`;
        });
        out += '</div>';
        const mergedTotal = merged.reduce((sum, s) => sum + (s.ended_at - s.started_at), 0);
        out += `<span class="session-duration">${fmtDuration(mergedTotal)}</span>`;
        out += '</div>';
      }

      Object.entries(byPlace).forEach(function(entry) {
        const place = entry[0], data = entry[1];
        out += '<div class="session-row">';
        const actionBreakdown = {};
        data.sessions.forEach(function(s) { actionBreakdown[s.action] = (actionBreakdown[s.action] || 0) + s.duration; });
        const labels = getActionLabels();
        const actionTip = Object.entries(actionBreakdown).sort((a, b) => b[1] - a[1]).map(a => (labels[a[0]] || a[0]) + ': ' + fmtDuration(a[1])).join('&#10;');
        out += `<span class="session-place" title="${esc(place)}&#10;${data.sessions.length} session${data.sessions.length > 1 ? 's' : ''}&#10;${actionTip}">${esc(place)}</span>`;
        out += '<div class="session-bar-wrap">';
        data.sessions.forEach(function(s) {
          const left = ((s.started_at - rangeStart) / rangeLen * 100).toFixed(1);
          const width = Math.max(((s.ended_at - s.started_at) / rangeLen * 100), 1).toFixed(1);
          const label = getActionLabels()[s.action] || s.action;
          const merged = s.count > 1 ? ' (' + s.count + ' sessions merged)' : '';
          out += `<div class="session-bar ${actionColor(s.action)}" style="position:absolute;left:${left}%;width:${width}%;top:0;height:100%" title="${label}${merged}&#10;${tf(s.started_at)} – ${tf(s.ended_at)}&#10;${fmtDuration(s.duration)}"></div>`;
        });
        out += '</div>';
        out += `<span class="session-duration">${fmtDuration(data.total)}</span>`;
        out += '</div>';
      });
      return out;
    }

    // Timeline
    if (!sessions.length) {
      html += '<div class="empty-state">No sessions recorded for this period.</div>';
    } else if (sessionsRange === 'week') {
      // Week mode: one combined timeline spanning Mon–Sun
      const dow = dayStart.getDay();
      const monOff = dow === 0 ? 6 : dow - 1;
      const monStart = new Date(dayStart.getTime() - monOff * 86400000);
      const rangeStart = Math.floor(monStart.getTime() / 1000);
      const rangeLen = 7 * 86400;
      // Day labels across the bar
      const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      html += '<div class="session-day">';
      html += '<div class="session-row" style="margin-bottom:2px">';
      html += '<span class="session-place"></span>';
      html += '<div class="session-bar-wrap" style="background:transparent;overflow:visible;height:14px">';
      dayNames.forEach(function(name, i) {
        const left = (i / 7 * 100).toFixed(1);
        html += `<span style="position:absolute;left:${left}%;font-size:0.7em;color:var(--fg-dim)">${name}</span>`;
      });
      html += '</div>';
      html += '<span class="session-duration"></span>';
      html += '</div>';
      html += renderTimeline(sessions, rangeStart, rangeLen, true);
      html += '</div>';
    } else {
      // Day mode: day-by-day sections
      sortedDays.forEach(function(day) {
        const daySorted = day.sessions.slice().sort((a, b) => a.started_at - b.started_at);
        const dayMerged = [];
        daySorted.forEach(function(s) {
          const prev = dayMerged.length ? dayMerged[dayMerged.length - 1] : null;
          if (prev && s.started_at <= prev.ended_at) {
            prev.ended_at = Math.max(prev.ended_at, s.ended_at);
          } else {
            dayMerged.push({ started_at: s.started_at, ended_at: s.ended_at });
          }
        });
        const dayDeduped = dayMerged.reduce((sum, s) => sum + (s.ended_at - s.started_at), 0);

        const earliest = Math.min(...day.sessions.map(s => s.started_at));
        const latest = Math.max(...day.sessions.map(s => s.ended_at));
        const rangeStart = earliest;
        const rangeLen = Math.max(latest - earliest, 1);

        html += '<div class="session-day">';
        html += `<div class="session-day-header"><h3>${fmtDate(day.date)}</h3><span>${fmtDuration(dayDeduped)}</span></div>`;
        html += renderTimeline(day.sessions, rangeStart, rangeLen);
        html += '</div>';
      });
    }

    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = '<div class="empty-state">Failed to load session data.</div>';
  }
}

// Column resizing — drag handles between sections
// Columns 1-2 use compact-specific vars when in compact mode, shared vars otherwise.
// Columns 3-4 only exist in normal mode.
(function() {
  const root = document.documentElement;
  function getColVar(col) {
    if (compactMode) {
      return { '1': '--compact-col1', '2': '--compact-col2' }[col];
    }
    return { '1': '--col1', '2': '--col3', '3': '--col3', '4': '--col4' }[col];
  }
  function getDefault(col) {
    if (compactMode) return { '1': 120, '2': 150 }[col] || 100;
    return { '1': 120, '2': 70, '3': 70, '4': 240 }[col] || 100;
  }
  function storageKey(col) {
    if (compactMode) return 'places-ccol' + col;
    // Col2 in normal mode maps to col3 (stats width)
    if (col === '2') return 'places-ncol3';
    return 'places-ncol' + col;
  }
  // Restore saved widths for both modes
  ['--col1','--col3','--col4','--col5'].forEach(function(v, i) {
    const key = 'places-ncol' + ['1','3','4','5'][i];
    const saved = localStorage.getItem(key);
    if (saved) root.style.setProperty(v, saved + 'px');
  });
  ['--compact-col1','--compact-col2'].forEach(function(v, i) {
    const key = 'places-ccol' + (i + 1);
    const saved = localStorage.getItem(key);
    if (saved) root.style.setProperty(v, saved + 'px');
  });
  // Col4 is paired with col5 — resizing meta must inversely resize actions
  // so the total stays constant and the path column doesn't shift.
  let dragCol = null, dragVar = null, startX = 0, startW = 0;
  let pairedVar = null, pairedStartW = 0;
  document.addEventListener('mousedown', function(e) {
    if (!e.target.classList.contains('col-resize')) return;
    const col = e.target.dataset.col;
    dragVar = getColVar(col);
    if (!dragVar) return;
    dragCol = col;
    pairedVar = null;
    e.preventDefault();
    e.target.classList.add('dragging');
    startX = e.clientX;
    // Col2 in normal mode: controls stats (next sibling), drag is inverted
    if (col === '2' && !compactMode) {
      const next = e.target.nextElementSibling;
      startW = next ? next.offsetWidth : getDefault(col);
    } else {
      const prev = e.target.previousElementSibling;
      startW = prev ? prev.offsetWidth : getDefault(col);
    }
    // Pair columns for inverse resize so the flex:1 path column doesn't shift
    if (!compactMode) {
      if (col === '3') {
        // stats ↔ meta: grow stats, shrink meta
        pairedVar = '--col4';
        const meta = e.target.nextElementSibling;
        pairedStartW = meta ? meta.offsetWidth : 240;
      } else if (col === '4') {
        // meta ↔ actions: grow meta, shrink actions
        pairedVar = '--col5';
        const next = e.target.nextElementSibling;
        pairedStartW = next ? next.offsetWidth : 260;
      }
    }
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragCol) return;
    let delta = e.clientX - startX;
    // Col2 in normal mode: inverted (drag right = stats shrinks)
    if (dragCol === '2' && !compactMode) delta = -delta;
    const newW = Math.max(40, startW + delta);
    root.style.setProperty(dragVar, newW + 'px');
    if (pairedVar) {
      const pairedW = Math.max(40, pairedStartW - delta);
      root.style.setProperty(pairedVar, pairedW + 'px');
    }
  });
  document.addEventListener('mouseup', function() {
    if (!dragCol) return;
    document.querySelectorAll('.col-resize.dragging').forEach(function(el) { el.classList.remove('dragging'); });
    const val = parseInt(getComputedStyle(root).getPropertyValue(dragVar));
    localStorage.setItem(storageKey(dragCol), val);
    if (pairedVar) {
      const pVal = parseInt(getComputedStyle(root).getPropertyValue(pairedVar));
      const pKey = pairedVar === '--col4' ? 'places-ncol4' : 'places-ncol5';
      localStorage.setItem(pKey, pVal);
    }
    dragCol = null;
    dragVar = null;
    pairedVar = null;
  });
})();

// Search-as-you-type: typing anywhere focuses the filter input
// 'S' toggles sessions mode (when not in screenshot mode)
document.addEventListener('keydown', function(e) {
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
  if (e.key === 'F2') { e.preventDefault(); toggleScreenshot(); return; }
  if (e.key === 'F3') { e.preventDefault(); toggleSessions(); return; }
  if (e.ctrlKey || e.altKey || e.metaKey) return;
  if (e.key.length === 1) {
    const input = document.getElementById('filter-search');
    input.focus();
  }
});

function saveFilters() {
  localStorage.setItem('places-filters', JSON.stringify({
    sort: currentSort,
    activeTags: [...activeTags],
    excludedTags: [...excludedTags],
    favFilter, dirtyFilter, textFilter, pinFavs
  }));
}
(function loadFilters() {
  try {
    const f = JSON.parse(localStorage.getItem('places-filters'));
    if (!f) return;
    if (f.sort) currentSort = f.sort;
    if (f.activeTags) activeTags = new Set(f.activeTags);
    if (f.excludedTags) excludedTags = new Set(f.excludedTags);
    if (f.favFilter) favFilter = true;
    if (f.dirtyFilter) dirtyFilter = true;
    if (f.textFilter) textFilter = f.textFilter;
    if (f.pinFavs !== undefined) pinFavs = f.pinFavs;
  } catch (e) {}
})();

function setSort(key) {
  currentSort = key;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + key).classList.add('active');
  saveFilters();
  load();
}

function toggleFavFilter() {
  favFilter = !favFilter;
  saveFilters();
  load();
}

function toggleDirtyFilter() {
  dirtyFilter = !dirtyFilter;
  saveFilters();
  load();
}

function togglePinFavs() {
  pinFavs = !pinFavs;
  saveFilters();
  load();
}

function frecencyScore(p) {
  if (!p.use_count || !p.last_used_at) return 0;
  const ageHours = (Date.now() - new Date(p.last_used_at).getTime()) / 3600000;
  const decay = Math.exp(-ageHours / 168); // half-life ~1 week
  return p.use_count * decay;
}

function sortPlaces(places) {
  return places.slice().sort((a, b) => {
    // Pin favorites to top when enabled (skip when filtering by favorites or sorting by desktop)
    if (pinFavs && !favFilter && currentSort !== 'desktop') {
      if (a.favorite && !b.favorite) return -1;
      if (!a.favorite && b.favorite) return 1;
    }
    switch (currentSort) {
      case 'name': return a.name.localeCompare(b.name);
      case 'use_count': return (b.use_count - a.use_count) || a.name.localeCompare(b.name);
      case 'last_used': return (b.last_used_at || '').localeCompare(a.last_used_at || '') || a.name.localeCompare(b.name);
      case 'added': return (b.added_at || '').localeCompare(a.added_at || '') || a.name.localeCompare(b.name);
      case 'frecency': return (frecencyScore(b) - frecencyScore(a)) || a.name.localeCompare(b.name);
      case 'desktop': return ((a.desktop || 99) - (b.desktop || 99)) || a.name.localeCompare(b.name);
      default: return 0;
    }
  });
}

async function load() {
  // Skip reload while an inline edit input or popup is active to prevent destroying it mid-interaction.
  if (document.querySelector('.note-input, .name-input, .path-input, .action-dropdown, .action-manager-overlay')) return;
  if (!overflowOpen && document.querySelector('.tag-overflow-menu.open')) return;
  if (document.activeElement && document.activeElement.classList.contains('desktop-select')) return;
  const el = document.getElementById('places');
  const tagBar = document.getElementById('tag-bar');
  try {
    const res = await fetch('/api/places');
    const data = await res.json();
    actionDefs = data.actions || {};
    notifyPath = data.notify_path || '';
    defaultHidden = data.default_hidden || [];
    claudeShell = data.claude_shell || (placesOS === 'windows' ? 'cmd' : 'iterm');
    defaultActions = data.default_actions || [];
    suppressTitle = !!data.suppress_title;
    desktopAvailable = !!data.desktop_available;
    detectRunning = !!data.detect_running;
    defaultEffort = data.default_effort || '';
    placesOS = data.os || 'windows';
    hasITerm = !!data.has_iterm;
    // Hide Windows-only UI elements on non-Windows
    if (placesOS !== 'windows') {
      document.getElementById('sort-desktop').style.display = 'none';
      document.getElementById('pin-all-btn').parentElement.style.display = 'none';
    }
    let places = data.places || [];
    lastPlacesData = places;
    if (!places.length) {
      document.getElementById('tag-bar-left').innerHTML = '';
      document.getElementById('tag-bar-right').innerHTML = '';
      el.innerHTML = '<div class="empty-state">No places saved yet.<br>Add one above or use <code>places add &lt;name&gt;</code> from the CLI.</div>';
      return;
    }

    // Build filter bar from all tags, sorted by usage count (top 5 shown, rest in overflow).
    const tagCounts = {};
    places.forEach(p => (p.tags || []).forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; }));
    const sortedTags = Object.keys(tagCounts).sort((a, b) => tagCounts[b] - tagCounts[a] || a.localeCompare(b));
    const MAX_VISIBLE_TAGS = 5;
    const visibleTags = sortedTags.slice(0, MAX_VISIBLE_TAGS);
    const overflowTags = sortedTags.slice(MAX_VISIBLE_TAGS);
    const gitBtn = '<button class="btn-io" onclick="updateAllGit()" title="Fetch git status for all visible places">Update git</button>';
    const hasFilters = activeTags.size > 0 || excludedTags.size > 0 || favFilter || dirtyFilter || textFilter;
    const favChip = `<button class="tag-chip chip-gap-right${favFilter ? ' active' : ''}" onclick="toggleFavFilter()" title="Show favorites only">&#9733;</button>`;
    const dirtyChip = `<button class="tag-chip chip-gap-left${dirtyFilter ? ' active' : ''}" onclick="toggleDirtyFilter()" title="Show only git-dirty places">Git dirty</button>`;

    function tagChip(t, overflow) {
      const fn = overflow ? 'overflowFilterTag' : 'filterTag';
      const efn = overflow ? 'overflowExcludeTag' : 'excludeTag';
      return `<button class="tag-chip${activeTags.has(t) ? ' active' : ''}${excludedTags.has(t) ? ' excluded' : ''}" onclick="${fn}('${esc(t)}')" oncontextmenu="${efn}(event,'${esc(t)}')" title="${esc(t)} (${tagCounts[t]}) — click to include, right-click to exclude">${esc(t)}</button>`;
    }
    const tagChips = visibleTags.map(t => tagChip(t, false)).join('');
    let overflowBtn = '';
    if (overflowTags.length) {
      const overflowActive = overflowTags.some(t => activeTags.has(t) || excludedTags.has(t));
      overflowBtn = `<span style="position:relative;display:inline-flex"><button class="tag-chip${overflowActive ? ' active' : ''}" onclick="toggleTagOverflow(event)" title="${overflowTags.length} more tags">\u2026</button><div class="tag-overflow-menu" id="tag-overflow-menu">${overflowTags.map(t => tagChip(t, true)).join('')}</div></span>`;
    }
    const clearBtn = `<button class="tag-chip chip-gap-left${hasFilters ? '' : ' disabled'}" onclick="clearFilters()"${hasFilters ? '' : ' disabled'} style="${hasFilters ? '' : 'opacity:0.3;pointer-events:none'}">Clear</button>`;
    document.getElementById('tag-bar-left').innerHTML = '<span>Filter:</span>' + favChip + tagChips + overflowBtn + dirtyChip;
    document.getElementById('tag-bar-right').innerHTML = clearBtn;
    document.getElementById('pin-favs-btn').classList.toggle('active', pinFavs);
    document.getElementById('tag-bar-git').innerHTML = gitBtn;
    // Reopen overflow menu if it was open before reload
    if (overflowOpen) {
      const menu = document.getElementById('tag-overflow-menu');
      if (menu) menu.classList.add('open');
      overflowOpen = false;
    }

    // Filter by active tags (AND) and excluded tags.
    if (activeTags.size > 0) {
      places = places.filter(p => [...activeTags].every(t => (p.tags || []).includes(t)));
    }
    if (excludedTags.size > 0) {
      places = places.filter(p => !(p.tags || []).some(t => excludedTags.has(t)));
    }

    // Filter by favorites.
    if (favFilter) {
      places = places.filter(p => p.favorite);
    }

    // Filter by git dirty (only places with fetched dirty status).
    if (dirtyFilter) {
      places = places.filter(p => isGitDirty(gitCache[p.name]));
    }

    // Filter by text search (name, path, note).
    if (textFilter) {
      const q = textFilter.toLowerCase();
      places = places.filter(p => p.name.toLowerCase().includes(q) || p.path.toLowerCase().includes(q) || (p.note || '').toLowerCase().includes(q));
    }

    const total = lastPlacesData.length;
    const shown = places.length;
    document.getElementById('status-count').textContent = shown === total ? total + ' places' : shown + ' / ' + total + ' places';

    places = sortPlaces(places);
    if (!places.length) {
      el.innerHTML = '<div class="empty-state">No places match the current filters.</div>';
      return;
    }
    let lastDesktopGroup = null;
    el.innerHTML = places.map(p => {
      let groupHeader = '';
      if (currentSort === 'desktop') {
        const group = p.desktop || 0;
        if (group !== lastDesktopGroup) {
          lastDesktopGroup = group;
          const label = group ? 'Desktop ' + group : 'No desktop';
          groupHeader = `<div class="desktop-group-header">${label}</div>`;
        }
      }
      const dName = maskName(p.name);
      const dPath = maskPath(p.name, p.path, p.tags);
      return groupHeader + `
      <div class="place-row${!p.exists ? ' stale' : ''}">
        <button class="btn-fav${p.favorite ? ' active' : ''}" onclick="toggleFav('${esc(p.name)}',${!p.favorite})" title="${p.favorite ? 'Unfavorite' : 'Favorite'}">${p.favorite ? '\u2605' : '\u2606'}</button>
        ${placesOS === 'windows' ? `<select class="desktop-select" onchange="setDesktop('${esc(p.name)}',parseInt(this.value))" title="Virtual desktop">
          <option value="0"${p.desktop ? '' : ' selected'}>\u2014</option>
          ${Array.from({length: desktopCount}, (_, i) => `<option value="${i+1}"${p.desktop===i+1 ? ' selected' : ''}>D${i+1}</option>`).join('')}
        </select>
        <button class="btn-desktop-go${p.desktop ? ' visible' : ''}" onclick="switchDesktop(${p.desktop || 0})" title="Switch to desktop ${p.desktop || ''}">\u2192</button>` : ''}
        <span class="health-dot ${healthClass(p)}" title="${healthTitle(p)}">${healthIcon(p)}</span>
        <span class="place-name" onclick="editName('${esc(p.name)}',this)" title="Click to rename">${esc(dName)}</span>
        <div class="col-resize" data-col="1"></div>
        <div class="place-info">
          <div class="place-info-row">
            <span class="place-path" onclick="editPath('${esc(p.name)}',this)" title="Click to edit path">${esc(dPath)}</span>
            ${!p.exists ? '<span class="badge-missing">missing</span>' : ''}
          </div>
          <div class="place-note-row">
            ${renderNote(p)}
          </div>
          <span class="compact-tags">${(p.tags || []).map(t => `<span class="badge-tag">${esc(t)}<span class="tag-x" onclick="removeTag('${esc(p.name)}','${esc(t)}')">\u00d7</span></span>`).join('')}<button class="btn-add-tag" onclick="promptAddTag('${esc(p.name)}')" title="Add tag">+</button></span>
        </div>
        <div class="col-resize" data-col="2"></div>
        <span class="place-stats">${p.use_count}x${p.last_used_at ? '<span class="stats-br"><br></span><span class="stats-sep"> &middot; </span>' + timeAgo(p.last_used_at) : ''}</span>
        <div class="col-resize" data-col="3"></div>
        <div class="place-meta">
          <div>
            ${p.exists ? (gitCache[p.name] ? renderGitBadge(gitCache[p.name]) : '<span class="badge-git-none">no status</span>') : ''}
            ${p.exists ? `<button class="btn-git" onclick="getGitStatus('${esc(p.name)}')" title="Check git status">git</button>` : ''}
          </div>
          <span class="place-tags">
            ${(p.tags || []).map(t => `<span class="badge-tag">${esc(t)}<span class="tag-x" onclick="removeTag('${esc(p.name)}','${esc(t)}')">\u00d7</span></span>`).join('')}
            <button class="btn-add-tag" onclick="promptAddTag('${esc(p.name)}')" title="Add tag">+</button>
          </span>
        </div>
        <div class="col-resize" data-col="4"></div>
        <div class="place-actions">
          ${p.exists ? `
            ${renderCustomActions(p)}
            ${renderDefaultActions(p)}
          ` : ''}
          <button class="btn-rm" onclick="showPlaceMenu(event,'${esc(p.name)}')" title="Place menu">&hellip;</button>
        </div>
      </div>
    `}).join('');
    applyRunningGlow();
  } catch (e) {
    el.innerHTML = '<div class="empty-state">Failed to load places.</div>';
  }
}

function timeAgo(iso) {
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60) return 'just now';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  const d = Math.floor(h / 24);
  if (d < 7) return d + 'd ago';
  return new Date(iso).toLocaleDateString(undefined, {month: 'short', day: 'numeric'});
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function isGitDirty(g) {
  if (!g) return false;
  if (g.dirty) return true;
  if (g.sub_repos) return g.sub_repos.some(r => r.dirty);
  return false;
}

function hasGitInfo(g) {
  if (!g) return false;
  if (g.error) return false;
  if (g.branch) return true;
  if (g.sub_repos && g.sub_repos.length) return true;
  return false;
}

function healthClass(p) {
  if (!p.exists) return 'health-red';
  const g = gitCache[p.name];
  if (!hasGitInfo(g)) return 'health-hidden';
  if (isGitDirty(g)) return 'health-yellow';
  return 'health-green';
}

function healthIcon(p) {
  if (!p.exists) return '\u2717';   // ✗
  const g = gitCache[p.name];
  if (!hasGitInfo(g)) return '';
  if (isGitDirty(g)) return '\u25C6';    // ◆
  return '\u2713';                        // ✓
}

function healthTitle(p) {
  if (!p.exists) return 'Directory missing';
  const g = gitCache[p.name];
  if (!hasGitInfo(g)) return '';
  if (g.sub_repos && g.sub_repos.length) {
    const dirty = g.sub_repos.filter(r => r.dirty).length;
    return g.sub_repos.length + ' repos: ' + (g.sub_repos.length - dirty) + ' clean' + (dirty ? ', ' + dirty + ' dirty' : '');
  }
  if (g.dirty) {
    let tip = 'Uncommitted changes';
    if (g.files && g.files.length) tip += '&#10;' + g.files.map(f => esc(f)).join('&#10;');
    return tip;
  }
  return 'Clean';
}

function renderNote(p) {
  const dn = maskNote(p.name, p.note, p.tags);
  if (dn) return `<span class="place-note" onclick="editNote('${esc(p.name)}',this)" title="Click to edit note">${esc(dn)}</span>`;
  return `<span class="place-note-empty" onclick="editNote('${esc(p.name)}',this)">+ note</span>`;
}

function getActionLabels() {
  if (placesOS === 'windows') return {claude:'Claude',explorer:'Explorer',code:'VS Code',powershell:'PowerShell',cmd:'cmd'};
  if (placesOS === 'darwin') return {claude:'Claude',explorer:'Finder',code:'VS Code',terminal:'Terminal'};
  return {claude:'Claude',explorer:'Files',code:'VS Code',terminal:'Terminal'};
}
async function openAt(name, action, shift, ctrl) {
  try {
    let label = getActionLabels()[action] || action;
    if (action === 'claude') {
      if (ctrl) label = 'Claude YOLO session';
      else if (shift) label = 'fresh Claude session';
      else label = 'Claude session';
      if (shift && !skipFreshConfirm) {
        const ok = await confirmDialog('Start a fresh Claude session at ' + name + '?\nThis will NOT continue the previous conversation.');
        if (!ok) return;

// Drag-and-drop folder onto path input via WebView2 native API
(function() {
  const pathInput = document.querySelector('.add-form input[name="path"]');
  window.addEventListener('dragover', function(e) {
    if (e.dataTransfer.types.includes('Files')) { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; }
  });
  window.addEventListener('drop', function(e) {
    if (!e.dataTransfer.types.includes('Files')) return;
    e.preventDefault();
    // Send files to Go via WebView2 native IPC for path resolution
    if (window.chrome && window.chrome.webview && window.chrome.webview.postMessageWithAdditionalObjects) {
      const files = e.dataTransfer.items
        ? Array.from(e.dataTransfer.items).filter(function(i) { return i.kind === 'file'; }).map(function(i) { return i.getAsFile(); })
        : Array.from(e.dataTransfer.files);
      chrome.webview.postMessageWithAdditionalObjects('file:drop:' + e.x + ':' + e.y, files);
    }
    // Poll for resolved path from Go side
    (async function() {
      for (let i = 0; i < 10; i++) {
        await new Promise(function(r) { setTimeout(r, 50); });
        try {
          const res = await fetch('/api/last-drop');
          if (res.ok && res.status !== 204) {
            const data = await res.json();
            if (data.path) { pathInput.value = data.path; return; }
          }
        } catch(err) {}
      }
    })();
  });
})();

function renderGitBadge(info) {
  if (info.error) return `<span class="badge-git-error">${esc(info.error)}</span>`;
  // Aggregate sub-repo status.
  if (info.sub_repos && info.sub_repos.length) {
    const total = info.sub_repos.length;
    const dirty = info.sub_repos.filter(r => r.dirty).length;
    const clean = total - dirty;
    const cls = dirty > 0 ? 'badge-git-dirty' : 'badge-git-clean';
    const icon = dirty > 0 ? '\u25CF' : '\u2713';
    const label = total + ' repo' + (total > 1 ? 's' : '') + ': ' + clean + ' clean' + (dirty ? ', ' + dirty + ' dirty' : '');
    let tooltip = info.sub_repos.map(r => {
      const rIcon = r.dirty ? '\u25CF' : '\u2713';
      let tip = rIcon + ' ' + esc(r.name) + ' (' + esc(r.branch) + ')';
      if (r.dirty && r.files && r.files.length) {
        tip += '&#10;  ' + r.files.map(f => esc(f)).join('&#10;  ');
      }
      return tip;
    }).join('&#10;');
    return `<span class="${cls}" title="${tooltip}">${icon} ${esc(label)}</span>`;
  }
  // Single repo status.
  const cls = info.dirty ? 'badge-git-dirty' : 'badge-git-clean';
  const icon = info.dirty ? '\u25CF' : '\u2713';
  let tooltip = esc(info.branch);
  if (info.dirty && info.files && info.files.length) {
    tooltip += '&#10;' + info.files.map(f => esc(f)).join('&#10;');
  }
  return `<span class="${cls}" title="${tooltip}">${icon} ${esc(info.branch)}</span>`;
}

  const hd = (placeData && placeData.hidden_defaults) || [];

  const isWin = placesOS === 'windows';
  const isMac = placesOS === 'darwin';
  const defaults = [
    {key: 'claude',     label: 'Claude Code (cl)'},
    {key: 'explorer',   label: (isMac ? 'Finder' : 'Explorer') + ' (dir)'},
    {key: 'code',       label: 'VS Code (VS)'},
    ...(isWin ? [
      {key: 'powershell', label: 'PowerShell (PS)'},
      {key: 'cmd',        label: 'cmd (>_)'},
    ] : [
      {key: 'terminal',   label: 'Terminal (>_)'},
    ]),
  ];

  const dd = document.createElement('div');
  dd.className = 'action-dropdown';

  defaults.forEach(function(d) {
    const item = document.createElement('div');
    item.className = 'action-dropdown-item';
    const shown = !hd.includes(d.key);
    item.innerHTML = (shown ? '&#10003; ' : '&nbsp;&nbsp;&nbsp; ') + esc(d.label);
    item.onclick = function(ev) {
      ev.stopPropagation();
      toggleDefault(placeName, d.key);
      dd.remove();
    };
    dd.appendChild(item);
  });

  // Custom action assign/unassign
  const allActions = Object.keys(actionDefs).sort();
  if (allActions.length) {
    const sep1 = document.createElement('div');
    sep1.className = 'dropdown-sep';
    dd.appendChild(sep1);
    const assigned = (placeData && placeData.actions) || [];
    allActions.forEach(function(name) {
      const item = document.createElement('div');
      item.className = 'action-dropdown-item dropdown-item-custom';
      const isAssigned = assigned.includes(name);
      item.innerHTML = (isAssigned ? '&#10003; ' : '&nbsp;&nbsp;&nbsp; ') + esc(actionDefs[name].label + ' (' + name + ')');
      item.onclick = function(ev) {
        ev.stopPropagation();
        dd.remove();
        if (isAssigned) unassignAction(placeName, name);
        else assignAction(placeName, name);
      };
      dd.appendChild(item);
    });
  }

  // Effort level
  const effortSep = document.createElement('div');
  effortSep.className = 'dropdown-sep';
  dd.appendChild(effortSep);
  const currentEffort = (placeData && placeData.effort) || '';
  EFFORT_LEVELS.forEach(function(level) {
    const item = document.createElement('div');
    item.className = 'action-dropdown-item';
    const isActive = currentEffort === level;
    const label = level ? level : 'default (' + (defaultEffort || 'medium') + ')';
    item.innerHTML = (isActive ? '&#10003; ' : '&nbsp;&nbsp;&nbsp; ') + 'Effort: ' + label;
    item.onclick = function(ev) {
      ev.stopPropagation();
      dd.remove();
      setPlaceEffort(placeName, level);

    dd.appendChild(item);

    const notifySep = document.createElement('div');
    notifySep.className = 'dropdown-sep';
    dd.appendChild(notifySep);
    const notifyItem = document.createElement('div');
    notifyItem.className = 'action-dropdown-item dropdown-item-notify';

async function setupNotify(placeName) {
  // Ensure notify path is configured.
  if (!notifyPath) {
    const p = await inputDialog('Path to notify executable:', 'C:/dev/tools/cli/notify.exe');
    if (!p) return;
    try {
      const res = await fetch('/api/notify-path', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({path: p})
      });
      if (!res.ok) { toast(await res.text() || 'Failed to save notify path', true); return; }
      notifyPath = p;
    } catch (e) { toast('Failed to save notify path', true); return; }
  }
  // Prompt for profile name.
  const defaultProfile = placeName.toLowerCase().replace(/[^a-z-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
  const profile = await inputDialog('Notify profile name (lowercase letters and hyphens):', defaultProfile);
  if (!profile) return;
  if (!/^[a-z]+(-[a-z]+)*$/.test(profile)) {
    toast('Invalid profile: use lowercase letters and hyphens only', true);
    return;
  }
  try {
    const res = await fetch('/api/setup-notify', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: placeName, profile: profile})
    });
    if (res.status === 409) { toast('Notify hooks already configured for ' + placeName); return; }
    if (!res.ok) { toast(await res.text() || 'Failed to setup notify', true); return; }
    toast('Notify hooks configured for "' + profile + '"');
  } catch (e) { toast('Failed to setup notify', true); }
}

// Note inline editing
function editNote(name, el) {
  const placeData = lastPlacesData.find(p => p.name === name);
  const currentNote = placeData ? (placeData.note || '') : '';
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'note-input';
  input.value = currentNote;
  input.placeholder = 'Add a note...';
  el.replaceWith(input);
  input.focus();
  input.select();

  let done = false;
  function finish() { done = true; input.remove(); }

  async function save() {
    if (done) return;
    finish();
    const note = input.value.trim();
    try {
      const res = await fetch('/api/note', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name, note})
      });
      if (res.ok) { load(); }
      else { toast(await res.text() || 'Failed', true); load(); }
    } catch (e) { toast('Failed', true); load(); }
  }

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); save(); }
    if (e.key === 'Escape') { e.preventDefault(); input.removeEventListener('blur', save); finish(); load(); }
  });
  input.addEventListener('blur', save);
}

// Name inline editing

// Custom input dialog (prompt() doesn't work in Wails WebView on macOS).
// Custom confirm dialog (confirm() doesn't work in Wails WebView on macOS).
function confirmDialog(message) {
  return new Promise(function(resolve) {
    const overlay = document.createElement('div');
    overlay.className = 'action-manager-overlay';
    overlay.onclick = function(e) { if (e.target === overlay) { overlay.remove(); resolve(false); } };
    const panel = document.createElement('div');
    panel.className = 'action-manager';
    panel.style.maxWidth = '400px';
    panel.style.padding = '16px';
    panel.innerHTML = `<div style="margin-bottom:12px;color:var(--fg);white-space:pre-line">${message}</div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn-io" id="confirm-cancel">Cancel</button>
        <button class="btn-io" id="confirm-ok" style="color:var(--accent)">OK</button>
      </div>`;
    overlay.appendChild(panel);
    document.body.appendChild(overlay);
    panel.querySelector('#confirm-ok').onclick = function() { overlay.remove(); resolve(true); };
    panel.querySelector('#confirm-cancel').onclick = function() { overlay.remove(); resolve(false); };
    panel.querySelector('#confirm-ok').focus();
    document.addEventListener('keydown', function handler(e) {
      if (e.key === 'Enter') { overlay.remove(); resolve(true); document.removeEventListener('keydown', handler); }
      if (e.key === 'Escape') { overlay.remove(); resolve(false); document.removeEventListener('keydown', handler); }
    });
  });
}

function inputDialog(message, defaultValue) {
  return new Promise(function(resolve) {
    const overlay = document.createElement('div');
    overlay.className = 'action-manager-overlay';
    overlay.onclick = function(e) { if (e.target === overlay) { overlay.remove(); resolve(null); } };
    const panel = document.createElement('div');
    panel.className = 'action-manager';
    panel.style.maxWidth = '400px';
    panel.style.padding = '16px';
    panel.innerHTML = `<div style="margin-bottom:12px;color:var(--fg)">${message}</div>
      <input type="text" value="${defaultValue || ''}" style="width:100%;padding:6px 8px;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:4px;font-size:14px;box-sizing:border-box">
      <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">
        <button class="btn-io" onclick="this.closest('.action-manager-overlay').remove()">Cancel</button>
        <button class="btn-io" id="input-dialog-ok">OK</button>
      </div>`;
    overlay.appendChild(panel);
    document.body.appendChild(overlay);
    const input = panel.querySelector('input');
    input.focus();
    input.select();
    function submit() { const v = input.value; overlay.remove(); resolve(v); }
    panel.querySelector('#input-dialog-ok').onclick = submit;
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') submit();
      if (e.key === 'Escape') { overlay.remove(); resolve(null); }
    });
  });
}

function toast(msg, err) {
  const el = document.createElement('div');
  el.className = 'toast ' + (err ? 'error' : 'ok');
  el.textContent = msg;
  const existing = document.querySelectorAll('.toast');
  el.style.bottom = (20 + existing.length * 48) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// Running session detection
let runningSessions = []; // [{name, action}, ...]
async function updateRunningSessions() {
  if (!detectRunning) { runningSessions = []; return; }
  try {
    const res = await fetch('/api/running-sessions');
    if (!res.ok) return;
    runningSessions = await res.json() || [];
    applyRunningGlow();
  } catch (e) {}
}

function getRunning(name, action) {
  return runningSessions.find(s => s.name === name.toLowerCase() && s.action === action);
}

function formatDuration(seconds) {
  if (seconds < 60) return seconds + 's';
  const m = Math.floor(seconds / 60);
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  const rm = m % 60;
  return rm ? h + 'h ' + rm + 'm' : h + 'h';
}

function runningTip(session) {
  if (!session) return '';
  let tip = session.desktop ? '\nRunning on Desktop ' + session.desktop : '\nRunning';
  if (session.elapsed) tip += ' \u00b7 ' + formatDuration(session.elapsed);
  if (session.today) tip += '\nToday: ' + formatDuration(session.today);
  return tip;
}

function applyRunningGlow() {
  // Action buttons in place rows.
  document.querySelectorAll('[data-place][data-action]').forEach(btn => {
    const session = getRunning(btn.dataset.place, btn.dataset.action);
    btn.classList.toggle('running-glow', !!session);
    if (session) {
      if (!btn.getAttribute('data-base-title')) btn.setAttribute('data-base-title', btn.title);
      btn.title = btn.getAttribute('data-base-title') + runningTip(session);
    } else if (btn.getAttribute('data-base-title')) {
      btn.title = btn.getAttribute('data-base-title');
      btn.removeAttribute('data-base-title');
    }
  });
  // Recent chips.
  document.querySelectorAll('.recent-chip[data-rname]').forEach(chip => {
    const session = getRunning(chip.dataset.rname, chip.dataset.raction);
    chip.classList.toggle('running-glow', !!session);
    if (session) {
      if (!chip.getAttribute('data-base-title')) chip.setAttribute('data-base-title', chip.title);
      chip.title = chip.getAttribute('data-base-title') + runningTip(session);
    } else if (chip.getAttribute('data-base-title')) {
      chip.title = chip.getAttribute('data-base-title');
      chip.removeAttribute('data-base-title');
    }
  });
  // Favorite chips.
  document.querySelectorAll('.fav-action-chip[data-rname]').forEach(chip => {
    const session = getRunning(chip.dataset.rname, chip.dataset.raction);
    chip.classList.toggle('running-glow', !!session);
    if (session) {
      if (!chip.getAttribute('data-base-title')) chip.setAttribute('data-base-title', chip.title);
      chip.title = chip.getAttribute('data-base-title') + runningTip(session);
    } else if (chip.getAttribute('data-base-title')) {
      chip.title = chip.getAttribute('data-base-title');
      chip.removeAttribute('data-base-title');
    }
  });
}

updateRunningSessions();
setInterval(updateRunningSessions, 5000);
